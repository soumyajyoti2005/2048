<svg width="900" height="300" viewBox="0 0 900 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .num { font-family: 'Comic Sans MS', cursive; font-weight: bold; text-anchor: middle; dominant-baseline: central; }
      .title { font-family: 'Comic Sans MS', cursive; font-weight: bold; fill: #ffdcf0; font-size: 72px; }
      .subtitle { font-family: 'Comic Sans MS', cursive; fill: #cd5293; font-size: 20px; }

      /* === TILE A: slides right, disappears on merge === */
      .tileA { animation: slideA 4s ease-in-out infinite; }
      @keyframes slideA {
        0%   { transform: translateX(0);     opacity: 1; }
        35%  { transform: translateX(74px);  opacity: 1; }
        45%  { transform: translateX(74px);  opacity: 0; }
        90%  { transform: translateX(0);     opacity: 0; }
        100% { transform: translateX(0);     opacity: 1; }
      }

      /* === TILE B: pulse on merge === */
      .tileB { animation: pulseB 4s ease-in-out infinite; }
      @keyframes pulseB {
        0%,38%       { transform: scale(1);    }
        48%          { transform: scale(1.3);  }
        58%          { transform: scale(0.92); }
        65%,100%     { transform: scale(1);    }
      }

      .valB_old { animation: goOut 4s ease-in-out infinite; }
      @keyframes goOut {
        0%,38% { opacity:1; } 45%,100% { opacity:0; }
      }
      .valB_new { animation: comeIn 4s ease-in-out infinite; }
      @keyframes comeIn {
        0%,44% { opacity:0; } 52%,100% { opacity:1; }
      }
      .tileB_old { animation: goOut 4s ease-in-out infinite; }
      .tileB_new { animation: comeIn 4s ease-in-out infinite; }

      /* === TILE C: slides up === */
      .tileC { animation: slideC 4s ease-in-out infinite; animation-delay:0.6s; }
      @keyframes slideC {
        0%   { transform: translateY(0);     opacity: 1; }
        35%  { transform: translateY(-74px); opacity: 1; }
        45%  { transform: translateY(-74px); opacity: 0; }
        90%  { transform: translateY(0);     opacity: 0; }
        100% { transform: translateY(0);     opacity: 1; }
      }

      /* === TILE D: pulse on merge === */
      .tileD { animation: pulseB 4s ease-in-out infinite; animation-delay:0.6s; }
      .valD_old { animation: goOut  4s ease-in-out infinite; animation-delay:0.6s; }
      .valD_new { animation: comeIn 4s ease-in-out infinite; animation-delay:0.6s; }
      .tileD_old { animation: goOut  4s ease-in-out infinite; animation-delay:0.6s; }
      .tileD_new { animation: comeIn 4s ease-in-out infinite; animation-delay:0.6s; }

      /* glow title */
      .glow { animation: glow 2s ease-in-out infinite alternate; }
      @keyframes glow {
        0%   { filter: drop-shadow(0 0 6px #e060a0);  }
        100% { filter: drop-shadow(0 0 22px #ff80c0); }
      }

      /* float badges */
      .b1 { animation: flt 2s ease-in-out infinite alternate; }
      .b2 { animation: flt 2s ease-in-out infinite alternate; animation-delay:.3s; }
      .b3 { animation: flt 2s ease-in-out infinite alternate; animation-delay:.6s; }
      @keyframes flt { 0%{transform:translateY(0)} 100%{transform:translateY(-6px)} }
    </style>
  </defs>

  <!-- Background -->
  <rect width="900" height="300" fill="#251525"/>
  <g opacity="0.1" fill="#cd5293">
    <circle cx="20" cy="20" r="2"/><circle cx="20" cy="280" r="2"/>
    <circle cx="880" cy="20" r="2"/><circle cx="880" cy="280" r="2"/>
  </g>

  <!-- ── LEFT PANEL ── -->
  <rect x="28" y="55" width="235" height="200" rx="14" fill="#331e33" opacity="0.8"/>

  <!-- ROW 1: Tile A (4) → Tile B (4→8) -->
  <!-- Tile B (stationary, merges) -->
  <g class="tileB" style="transform-origin:185px 115px">
    <rect class="tileB_old" x="148" y="87" width="74" height="56" rx="10" fill="#9a3870"/>
    <rect class="tileB_new" x="148" y="87" width="74" height="56" rx="10" fill="#b84282"/>
    <text class="num valB_old" x="185" y="115" fill="#ffdcf0" font-size="26">4</text>
    <text class="num valB_new" x="185" y="115" fill="#ffdcf0" font-size="26">8</text>
  </g>
  <!-- Tile A (slides right) -->
  <g class="tileA" style="transform-origin:75px 115px">
    <rect x="38" y="87" width="74" height="56" rx="10" fill="#9a3870"/>
    <text class="num" x="75" y="115" fill="#ffdcf0" font-size="26">4</text>
  </g>

  <!-- ROW 2: Tile C (2) → Tile D (2→4) -->
  <!-- Tile D (stationary, merges) — positioned at row1 col1 -->
  <g class="tileD" style="transform-origin:75px 115px">
    <rect class="tileD_old" x="38" y="87" width="74" height="56" rx="10" fill="#7a3060"/>
    <rect class="tileD_new" x="38" y="87" width="74" height="56" rx="10" fill="#9a3870"/>
    <text class="num valD_old" x="75" y="115" fill="#ffdcf0" font-size="26">2</text>
    <text class="num valD_new" x="75" y="115" fill="#ffdcf0" font-size="26">4</text>
  </g>
  <!-- Tile C slides up -->
  <g class="tileC" style="transform-origin:75px 189px">
    <rect x="38" y="161" width="74" height="56" rx="10" fill="#7a3060"/>
    <text class="num" x="75" y="189" fill="#ffdcf0" font-size="26">2</text>
  </g>

  <!-- static bottom-right tile -->
  <rect x="148" y="161" width="74" height="56" rx="10" fill="#b84282"/>
  <text class="num" x="185" y="189" fill="#ffdcf0" font-size="22">8</text>

  <!-- ── CENTER TITLE ── -->
  <g class="glow">
    <text x="450" y="125" class="title" text-anchor="middle">2048</text>
  </g>
  <text x="450" y="163" class="subtitle" text-anchor="middle">A Pygame Puzzle Game</text>

  <g class="b1">
    <rect x="318" y="186" width="108" height="30" rx="15" fill="#3a2040"/>
    <text x="372" y="206" font-family="monospace" font-size="12" fill="#e060a0" text-anchor="middle">🎮 Keyboard</text>
  </g>
  <g class="b2">
    <rect x="438" y="186" width="90" height="30" rx="15" fill="#3a2040"/>
    <text x="483" y="206" font-family="monospace" font-size="12" fill="#e060a0" text-anchor="middle">👆 Swipe</text>
  </g>
  <g class="b3">
    <rect x="540" y="186" width="84" height="30" rx="15" fill="#3a2040"/>
    <text x="582" y="206" font-family="monospace" font-size="12" fill="#e060a0" text-anchor="middle">🌐 Web</text>
  </g>

  <!-- ── RIGHT PANEL — tile showcase ── -->
  <rect x="648" y="55" width="240" height="200" rx="14" fill="#331e33" opacity="0.8"/>

  <!-- Row 1 -->
  <rect x="656" y="63"  width="52" height="40" rx="8" fill="#7a3060"/>
  <text class="num" x="682" y="83"  fill="#ffdcf0" font-size="14">2</text>
  <rect x="713" y="63"  width="52" height="40" rx="8" fill="#9a3870"/>
  <text class="num" x="739" y="83"  fill="#ffdcf0" font-size="14">4</text>
  <rect x="770" y="63"  width="52" height="40" rx="8" fill="#b84282"/>
  <text class="num" x="796" y="83"  fill="#ffdcf0" font-size="14">8</text>
  <rect x="827" y="63"  width="52" height="40" rx="8" fill="#cd5293"/>
  <text class="num" x="853" y="83"  fill="#ffdcf0" font-size="13">16</text>

  <!-- Row 2 -->
  <rect x="656" y="109" width="52" height="40" rx="8" fill="#e060a0"/>
  <text class="num" x="682" y="129" fill="#ffdcf0" font-size="13">32</text>
  <rect x="713" y="109" width="52" height="40" rx="8" fill="#dc3c78"/>
  <text class="num" x="739" y="129" fill="#ffdcf0" font-size="13">64</text>
  <rect x="770" y="109" width="52" height="40" rx="8" fill="#c82864"/>
  <text class="num" x="796" y="129" fill="#ffdcf0" font-size="12">128</text>
  <rect x="827" y="109" width="52" height="40" rx="8" fill="#b41450"/>
  <text class="num" x="853" y="129" fill="#ffdcf0" font-size="12">256</text>

  <!-- Row 3 -->
  <rect x="656" y="155" width="52" height="40" rx="8" fill="#a00a3c"/>
  <text class="num" x="682" y="175" fill="#ffdcf0" font-size="12">512</text>
  <rect x="713" y="155" width="52" height="40" rx="8" fill="#82052d"/>
  <text class="num" x="739" y="175" fill="#ffdcf0" font-size="11">1024</text>
  <rect x="770" y="155" width="109" height="40" rx="8" fill="#ffdcf0"/>
  <text class="num" x="824" y="175" fill="#82052d" font-size="13">2048 ✨</text>

  <!-- bottom -->
  <line x1="80" y1="268" x2="820" y2="268" stroke="#3a2040" stroke-width="1" opacity="0.5"/>
  <text x="450" y="285" font-family="monospace" font-size="11" fill="#7a3060" text-anchor="middle">Made with ❤️ using Python &amp; Pygame</text>
</svg>